<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>出生时间终极成分解码器</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f0c1b 0%, #1a103c 50%, #0d0722 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --accent-color: #9d4edd;
            --accent-glow: #e0aaff;
            --text-main: #f3ecf9;
            --text-muted: #b3a2c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(15, 10, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 25px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题与头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 表单区 */
        .quiz-box {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--accent-glow);
            font-weight: bold;
        }

        /* 自定义下拉框样式适配手机 */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 12px;
            color: var(--accent-glow);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select {
            width: 100%;
            padding: 14px 15px;
            font-size: 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: #fff;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
        }

        select option {
            background: #1a103c;
            color: #fff;
        }

        /* 按钮通用 */
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7b2cbf 0%, #5a189a 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        /* 二次确认弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 3, 10, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: #1e1245;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #ff9e00;
        }

        .modal p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
        }

        .btn-confirm {
            background: #ff9e00;
            color: #000;
        }

        /* 加载动效 */
        .loading-box {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 结果展示区 */
        .result-box {
            display: none;
        }

        .result-title {
            text-align: center;
            font-size: 20px;
            color: #00f5d4;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--card-border);
        }

        .dimension-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
        }

        .dimension-card h4 {
            font-size: 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dim-1 h4 { color: #ff758f; }
        .dim-2 h4 { color: #ffd166; }
        .dim-3 h4 { color: #4cc9f0; }
        .dim-4 h4 { color: #06d6a0; }

        .dimension-card p {
            font-size: 14px;
            line-height: 1.6;
            color: #e0d5ed;
            text-align: justify;
        }

        .restart-btn {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">

        </div>

            </div>
        </div>

        <button class="btn btn-primary" onclick="openConfirmModal()">⚡ 开启命运解码</button>
    </div>

    <div id="loadingPage" class="loading-box">
        <div class="spinner"></div>
        <p id="loadingText" style="color: var(--text-muted); font-size: 14px;">正在量子对齐古代星盘与现代神经科学...</p>
    </div>

    <div id="resultPage" class="result-box">
        <div class="result-title" id="resTitle"></div>

        <div class="dimension-card dim-1">
            <h4>🧠 现代认知（当代人设）</h4>
            <p id="resModern"></p>
        </div>

        <div class="dimension-card dim-2">
            <h4>👥 群众认知（刻板印象）</h4>
            <p id="resPublic"></p>
        </div>

        <div class="dimension-card dim-3">
            <h4>📜 古代说法（玄学星盘）</h4>
            <p id="resAncient"></p>
        </div>

        <div class="dimension-card dim-4">
            <h4>🔬 实际上的科学研究与原因</h4>
            <p id="resScience"></p>
        </div>

        <button class="btn restart-btn" onclick="restartQuiz()">↩️ 换个时间再测</button>
    </div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal">
        <h3>⚠️ 确认窥探天机？</h3>

            <button class="btn btn-cancel" onclick="closeConfirmModal()">让我想想</button>
            <button class="btn btn-confirm" onclick="startAnalysis()">绝不后悔，查！</button>
        </div>
    </div>
</div>

    function openConfirmModal() {
        const select = document.getElementById('timeSelect');
        if (!select.value) {
            alert("🔮 宇宙提示：请先选择您的出生时间段！");
            return;
        }
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmModal').style.display = 'none';
    }

    function startAnalysis() {
        closeConfirmModal();
        
        // 隐藏问卷，显示加载
        document.getElementById('quizPage').style.display = 'none';
        document.getElementById('loadingPage').style.display = 'block';

        const loadingTexts = [
            "正在对接现代时钟生物学基因库...",
            "正在扫描古代星盘及12地支轨迹...",
            "正在提取群众刻板印象大数据...",
            "正在生成您的终极解码报告..."
        ];

        let textIndex = 0;
        const interval = setInterval(() => {
            if (textIndex < loadingTexts.length) {
                document.getElementById('loadingText').innerText = loadingTexts[textIndex];
                textIndex++;
            }
        }, 400);

        // 1.6秒后展示结果
        setTimeout(() => {
            clearInterval(interval);
            showResult();
        }, 1600);
    }

    function showResult() {
        const select = document.getElementById('timeSelect');
        const data = database[select.value];

        // 填充数据
        document.getElementById('resTitle').innerText = data.title;
        document.getElementById('resModern').innerText = data.modern;
        document.getElementById('resPublic').innerText = data.public;
        document.getElementById('resAncient').innerText = data.ancient;
        document.getElementById('resScience').innerText = data.science;

        // 切换页面
        document.getElementById('loadingPage').style.display = 'none';
        document.getElementById('resultPage').style.display = 'block';
        
        // 滚动到顶部
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
        // 重置下拉框
        document.getElementById('timeSelect').selectedIndex = 0;
        // 切换回主页
        document.getElementById('resultPage').style.display = 'none';
        document.getElementById('quizPage').style.display = 'block';
    }
</script>
