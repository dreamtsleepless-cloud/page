            const selectedValue = select.value;
            const container = document.getElementById('app-container');
            const data = shichenDatabase[selectedValue];

            // 移除旧的渐变类
            container.className = `w-full max-w-md min-h-screen bg-gradient-to-b ${data.theme} flex flex-col justify-between p-6 relative overflow-hidden transition-all duration-1000`;
        }

        // 二次确认与仪式感加载
        function triggerVerification() {
            const select = document.getElementById('shichen-select');
            const selectedValue = select.value;
            const data = shichenDatabase[selectedValue];

            // 配置加载页面的文字
            document.getElementById('loading-shichen').innerText = data.name;
            
            // 切换到加载视图
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            // 步骤式动画，假装在提取科学和玄学数据，拉高专业感
            const statusTexts = [
                "正在对齐古代星宿罗盘...",
                "正在比对时间生物学（Chronobiology）数据库...",
                "正在提取你的时间基因特质..."
            ];
            
            let step = 0;
            const interval = setInterval(() => {
                if (step < statusTexts.length) {
                    document.getElementById('loading-status').innerText = statusTexts[step];
                    step++;
                }
            }, 600);

            // 1.8秒后渲染并展示结果
            setTimeout(() => {
                clearInterval(interval);
                renderResult(data);
            }, 1800);
        }

        // 渲染结果页
        function renderResult(data) {
            document.getElementById('res-shichen-title').innerText = data.name + "人";
            document.getElementById('res-shichen-time').innerText = `(${data.time})`;
            document.getElementById('res-shichen-tag').innerText = data.tag;
            
            document.getElementById('res-ancient').innerText = data.ancient;
            document.getElementById('res-public').innerText = data.public;
            document.getElementById('res-science').innerText = data.science;
            document.getElementById('res-tip').innerText = data.tip;

            // 隐藏加载，显示结果
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
        }

        // 重置测试
        function resetTest() {
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            // 恢复初始默认色
            updateThemePreview();
        }

        // 页面初始化
        window.onload = function() {
            updateThemePreview();
        };
    </script>
</body>
</html>
